services:
  # Backend: Django API
  - type: web
    name: decibel-backend
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: decibel-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*" # You should update this with your actual domain later

  # Frontend: React Static Site
  - type: web
    name: backfrontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: decibel-backend
          type: web
          property: host

databases:
  - name: decibel-db
    region: singapore
    plan: free
